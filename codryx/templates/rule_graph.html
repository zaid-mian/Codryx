<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PyGuardian Rule Graph</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .rule { margin: 6px 0; }
    .cond { color: #333; }
  </style>
</head>
<body>
  <h1>Rule Graph</h1>
  <p>Rules</p>
  <ul>
    {% for r in rules.rules %}
      {% if r.condition %}
        <li class="rule"><span class="cond">{{ r.condition }}</span></li>
      {% else %}
        <li class="rule"><span class="cond">{{ r }}</span></li>
      {% endif %}
    {% endfor %}
  </ul>
</body>
</html>
